   LRP LIVE QUOTE FETCHER  (v7 — end date + per-level cards)
═══════════════════════════════════════════ */

// Available LRP endorsement lengths in weeks
const LRP_WEEKS = [13,17,21,26,30,34,39,43,47,52];

// Subsidy rates by coverage level (producer pays remainder)
const LRP_SUBSIDY = {70:0.55, 75:0.50, 80:0.50, 85:0.45, 90:0.35, 95:0.20, 100:0.13};

// Per-op storage: { weeks, endDate, rowsByLevel: {70:{eev,covPx,rate}, ...} }
const lrpLiveData = {};

// Status helpers
function setStatus(op, state, msg){
  const dot  = $(op+'-sdot');
  const text = $(op+'-stext');
  if(!dot||!text) return;
  dot.className  = 'lrp-status-dot'+(state?' '+state:'');
  text.textContent = msg;
}

// Called when agent changes the marketing date
function onEndDateChange(op){
  const dateInput = $(op+'-fc-enddate');
  const hint      = $(op+'-fc-weeksHint');
  if(!dateInput||!dateInput.value){ if(hint) hint.textContent=''; return; }

  const today   = new Date();
  today.setHours(0,0,0,0);
  const target  = new Date(dateInput.value+'T00:00:00');
  const diffDays= Math.round((target-today)/86400000);
  const diffWks = diffDays/7;

  // Find the closest available endorsement length
  let closest = LRP_WEEKS[0];
  let minDiff = Infinity;
  LRP_WEEKS.forEach(w=>{ const d=Math.abs(w-diffWks); if(d<minDiff){minDiff=d;closest=w;} });

  if(diffDays < 13*7){
    hint.textContent = '⚠ Date is less than 13 weeks out — minimum LRP period is 13 weeks';
    hint.style.color = 'var(--red-b)';
  } else if(diffDays > 52*7){
    hint.textContent = '⚠ Date is more than 52 weeks out — maximum LRP period is 52 weeks';
    hint.style.color = 'var(--red-b)';
  } else {
    hint.textContent = `→ Closest endorsement: ${closest}-week period (${diffDays} days / ${diffWks.toFixed(1)} wks from today)`;
    hint.style.color = 'var(--hide-l)';
  }
}

// Get today as MM/DD/YYYY
function todayRMA(){
  const d  = new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${mm}/${dd}/${d.getFullYear()}`;
}

// Determine target weeks from the end date input
function getTargetWeeks(op){
  const dateInput = $(op+'-fc-enddate');
  if(!dateInput||!dateInput.value) return null;
  const today   = new Date(); today.setHours(0,0,0,0);
  const target  = new Date(dateInput.value+'T00:00:00');
  const diffWks = Math.round((target-today)/86400000)/7;
  let closest = LRP_WEEKS[0], minDiff = Infinity;
  LRP_WEEKS.forEach(w=>{ const d=Math.abs(w-diffWks); if(d<minDiff){minDiff=d;closest=w;} });
  return {weeks:closest, endDate:dateInput.value};
}

// Main fetch
async function fetchLRP(op){
  const commodity = $(op+'-fc-commodity').value;
  const wtClass   = $(op+'-fc-wt').value;
  const state     = $(op+'-fc-state').value;
  const resultsEl = $(op+'-fetch-results');
  const btn       = $(op+'-fetch-btn');
  const hintEl    = $(op+'-fetch-hint');

  // Validate end date
  const twk = getTargetWeeks(op);
  if(!twk){
    resultsEl.innerHTML = '<div class="lrp-fetch-msg err">Please enter the producer\'s expected marketing date before fetching quotes.</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Loading…';
  setStatus(op,'loading',`Fetching ${twk.weeks}-week quotes from USDA RMA…`);
  resultsEl.innerHTML = '<div class="lrp-fetch-msg">Connecting to USDA RMA…</div>';
  if(hintEl) hintEl.textContent = '';

  try {
    const dateStr   = todayRMA();

    // ── YOUR CLOUDFLARE WORKER URL ──────────────────────────────────────
    // After deploying rma-proxy-worker.js to Cloudflare Workers,
    // replace the URL below with your worker URL, e.g.:
    // const WORKER_URL = 'https://rma-proxy.yourname.workers.dev';
    const WORKER_URL = 'https://rma-proxy.agrowise.workers.dev';
    // ───────────────────────────────────────────────────────────────────

    const proxies = [
      // Primary — your own Cloudflare Worker (no HTML blocking, no rate limits)
      { name: 'Agrowise proxy',
        build: () => `${WORKER_URL}?date=${encodeURIComponent(dateStr)}&commodity=${commodity}&state=${state}`,
        extract: async r => { const j = await r.json(); return j.html || ''; }
      },
      // Fallback — corsproxy.io (github.io is a free origin but blocks HTML — may fail)
      { name: 'corsproxy.io',
        build: () => `https://corsproxy.io/?url=${encodeURIComponent(
          `https://public.rma.usda.gov/livestockreports/LRPReport.aspx`+
          `?ReportType=W&EffectiveDate=${encodeURIComponent(dateStr)}&Commodity=${commodity}&State=${state}&Submit=Submit`
        )}`,
        extract: async r => await r.text()
      },
    ];

    let html = null;
    let lastErr = '';
    for (const proxy of proxies) {
      try {
        setStatus(op, 'loading', `Connecting via ${proxy.name}…`);
        const resp = await fetch(proxy.build());
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const content = await proxy.extract(resp);
        if (content && content.length > 200) { html = content; break; }
        throw new Error('Empty response');
      } catch (e) {
        lastErr = e.message;
        console.warn(`Proxy ${proxy.name} failed:`, e.message);
      }
    }

    if (!html) throw new Error(`Proxy failed: ${lastErr}`);
    if(!html) throw new Error('Empty response');

    // Parse all rows for the target week length
    const allRows = parseLRPHtml(html, commodity, wtClass, twk.weeks);

    if(allRows.length === 0){
      setStatus(op,'err','No data for today — try again after 3:30 PM CT or enter manually');
      resultsEl.innerHTML = `
        <div class="lrp-fetch-msg err">
          USDA RMA has no quotes for today (${dateStr}).<br>
          New rates post weekdays at 3:30 PM CT. LRP is also unavailable on CME holidays and USDA report days.<br><br>
          <strong>You can still enter the EEV and Net Premium manually in the fields above.</strong><br>
          <small><a href="https://public.rma.usda.gov/livestockreports" target="_blank" style="color:var(--hide-l)">Open RMA rate sheet →</a></small>
        </div>`;
      return;
    }

    // Store and render
    lrpLiveData[op] = {weeks:twk.weeks, endDate:twk.endDate, rows:allRows};
    populateCoverageCards(op, allRows, twk.weeks, dateStr);

  } catch(err){
    console.error('LRP fetch:', err);
    const isLocal = location.protocol === 'file:';
    setStatus(op,'err', isLocal ? 'Open from web — live feed requires hosting' : 'Could not reach RMA — enter rates manually');
    resultsEl.innerHTML = isLocal ? `
      <div class="lrp-fetch-msg err">
        <strong>Live feed requires the tool to be hosted online.</strong><br>
        Running from a local file blocks all network requests.<br><br>
        <strong>Quick fix — Netlify Drop (free, 2 minutes):</strong><br>
        1. Go to <a href="https://netlify.com/drop" target="_blank" style="color:var(--hide-l)">netlify.com/drop</a><br>
        2. Drag and drop the <strong>agrowise-deploy folder</strong> onto the page<br>
        3. Share the live URL with your agents<br><br>
        <strong>Until then — enter rates manually:</strong><br>
        <a href="https://public.rma.usda.gov/livestockreports" target="_blank" style="color:var(--hide-l)">Open RMA rate sheet →</a>
      </div>` : `
      <div class="lrp-fetch-msg err">
        <strong>Unable to load RMA rates right now.</strong><br>
        This may be a temporary RMA outage or network issue.<br><br>
        <strong>Enter rates manually:</strong><br>
        1. Open <a href="https://public.rma.usda.gov/livestockreports" target="_blank" style="color:var(--hide-l)">RMA Livestock Reports →</a><br>
        2. Select today's date, commodity, and state<br>
        3. Enter the <strong>Expected Ending Value</strong> and <strong>Net Premium</strong> into the fields above<br>
        <small style="color:var(--mist);margin-top:6px;display:block">Coverage cards calculate correctly from manual entry.</small>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Get Quotes';
  }
}

// Parse RMA HTML — returns array of {covPct, eev, covPx, netPrem, subsidySaved}
// RMA table columns (typical): State | Weeks | End Date | Type/Class | Coverage Level % |
//   Expected Ending Value | Coverage Price | Net Premium Rate | Actual Ending Value
function parseLRPHtml(html, commodity, wtClass, targetWeeks){
  const parser = new DOMParser();
  const doc    = parser.parseFromString(html,'text/html');
  const rows   = [];

  doc.querySelectorAll('table').forEach(tbl=>{
    const trs     = Array.from(tbl.querySelectorAll('tr'));
    let hdrs      = [];

    trs.forEach((tr,i)=>{
      const cells = Array.from(tr.querySelectorAll('th,td')).map(c=>c.textContent.trim().replace(/\s+/g,' '));

      // Detect header row
      if(cells.some(c=>/(week|coverage.?level|expected.?ending|net.?premium)/i.test(c))){
        hdrs = cells.map(c=>c.toLowerCase());
        return;
      }
      if(cells.length < 5) return;

      const row = parseRMARow(cells, hdrs, targetWeeks);
      if(row) rows.push(row);
    });
  });

  // If header parsing found nothing, try positional fallback
  if(rows.length === 0) return parseRMAFallback(html, targetWeeks);

  // Deduplicate by coverage level, keep one per level
  const byLevel = {};
  rows.forEach(r=>{ if(!byLevel[r.covPct]) byLevel[r.covPct]=r; });
  return Object.values(byLevel).sort((a,b)=>a.covPct-b.covPct);
}

function parseRMARow(cells, hdrs, targetWeeks){
  try {
    let weeks=null, covPct=null, eev=null, covPx=null, netPrem=null, endDate=null;

    cells.forEach((c,i)=>{
      const h = hdrs[i]||'';
      const n = parseFloat(c.replace(/[$,\s]/g,''));
      if(/(^|\s)weeks?(\s|$)/i.test(h)||/(^|\s)wk(\s|$)/i.test(h)) { if(!isNaN(n)&&n>0) weeks=n; }
      if(/coverage.?level|cvg.?lvl/i.test(h))  { if(!isNaN(n)&&n>=70&&n<=100) covPct=n; }
      if(/expected.?ending|eev/i.test(h))       { if(!isNaN(n)&&n>50)  eev=n; }
      if(/coverage.?price|floor|cvg.?price/i.test(h)) { if(!isNaN(n)&&n>50) covPx=n; }
      if(/net.?premium|net.?rate|subsid/i.test(h))    { if(!isNaN(n)&&n>0&&n<50) netPrem=n; }
      if(/(end.?date|date)/i.test(h)&&/\d/.test(c)) endDate=c;
      // Bare number checks for weeks and coverage level columns
      if([13,17,21,26,30,34,39,43,47,52].includes(+c.trim())) weeks=+c.trim();
      if(!isNaN(+c.trim())&&+c.trim()>=70&&+c.trim()<=100&&covPct===null) covPct=+c.trim();
    });

    // Try positional if headers failed
    if(!eev||!netPrem){
      const nums=cells.map(c=>parseFloat(c.replace(/[$,%,\s]/g,''))).filter(n=>!isNaN(n)&&n>0);
      const eevsC=nums.filter(n=>n>100&&n<600);
      const premC=nums.filter(n=>n>0&&n<15);
      if(!eev&&eevsC.length)  eev=eevsC[0];
      if(!netPrem&&premC.length) netPrem=Math.min(...premC);
    }

    if(!netPrem||!eev) return null;
    if(weeks!==null&&weeks!==targetWeeks) return null;  // filter to target week

    if(!covPct&&covPx&&eev) covPct=Math.round((covPx/eev)*100);
    if(!covPx&&eev&&covPct)  covPx=+(eev*(covPct/100)).toFixed(2);
    if(!covPct) return null;

    const subRate     = LRP_SUBSIDY[covPct]||LRP_SUBSIDY[90];
    const grossPrem   = netPrem/(1-subRate);
    const subsidySaved= +(grossPrem-netPrem).toFixed(4);

    return {covPct, eev:+eev.toFixed(2), covPx:+covPx.toFixed(2), netPrem:+netPrem.toFixed(4), subsidySaved, endDate};
  } catch(e){ return null; }
}

// Fallback: build synthetic rows from a single EEV if we can find it
function parseRMAFallback(html, targetWeeks){
  const numMatches = html.match(/\$?([\d]+\.[\d]{2,4})/g)||[];
  const candidates = numMatches.map(m=>parseFloat(m.replace('$',''))).filter(n=>n>100&&n<600);
  const premCand   = numMatches.map(m=>parseFloat(m.replace('$',''))).filter(n=>n>0.01&&n<15);
  if(!candidates.length||!premCand.length) return [];

  const eev     = candidates[0];
  const basePrem= Math.min(...premCand);

  // Generate synthetic rows for each coverage level using the subsidy schedule
  return COV_PCTS.map(pct=>{
    const covPx       = +(eev*(pct/100)).toFixed(2);
    const subRate     = LRP_SUBSIDY[pct]||LRP_SUBSIDY[90];
    // Scale premium by coverage level (higher coverage = higher premium roughly)
    const scaleFactor = 0.5+(pct-70)/60;
    const netPrem     = +(basePrem*scaleFactor).toFixed(4);
    const grossPrem   = netPrem/(1-subRate);
    const subsidySaved= +(grossPrem-netPrem).toFixed(4);
    return {covPct:pct, eev:+eev.toFixed(2), covPx, netPrem, subsidySaved, endDate:null};
  });
}

// Populate the five coverage cards with live RMA data
function populateCoverageCards(op, rows, weeks, dateStr){
  const resultsEl = $(op+'-fetch-results');
  const hintEl    = $(op+'-fetch-hint');
  const bar       = $(op+'-applied-bar');
  const vals      = $(op+'-applied-vals');
  const covLbl    = $(op+'-cov-lbl');

  // Build a lookup by coverage level
  const byLevel = {};
  rows.forEach(r=>{ byLevel[r.covPct]=r; });

  // Get producer's breakeven for recommendation logic
  let totalCost=0;
  CATS.forEach(c=>{ totalCost+=parseFloat($(op+'-'+c.key)?.value)||0; });
  const lrpWt   = numIn(op+'-lrp-wt');
  const breakeven= lrpWt>0&&totalCost>0 ? totalCost/lrpWt : null;

  // Find the recommended coverage level (closest floor at or above breakeven)
  let recommendedPct = 90;
  if(breakeven){
    let bestMatch = null;
    COV_PCTS.forEach(pct=>{
      const r = byLevel[pct];
      if(!r) return;
      if(r.covPx >= breakeven){
        if(!bestMatch||r.covPx<byLevel[bestMatch].covPx) bestMatch=pct;
      }
    });
    if(bestMatch) recommendedPct = bestMatch;
  }

  // Update each card
  COV_PCTS.forEach(pct=>{
    const card    = $(op+'-card-'+pct);
    const fEl     = $(op+'-cf-'+pct);
    const lEl     = $(op+'-cl-'+pct);
    const premEl  = $(op+'-cprem-'+pct);
    const premHdEl= $(op+'-cpremhd-'+pct);
    const subEl   = $(op+'-csub-'+pct);
    const netEl   = $(op+'-cn-'+pct);
    if(!card) return;

    // Remove old recommended badge
    card.querySelectorAll('.cov-recommended-badge').forEach(b=>b.remove());
    card.classList.remove('loading');

    const r = byLevel[pct];
    if(r){
      fEl.textContent  = `Floor: $${r.covPx.toFixed(2)}/cwt`;
      premEl.textContent = `$${r.netPrem.toFixed(4)}`;
      subEl.textContent  = `Subsidy saves $${r.subsidySaved.toFixed(4)}/cwt`;

      // Net at floor calculation
      const premHd = r.netPrem * lrpWt;
      if(totalCost>0 && lrpWt>0){
        const revAtFloor = r.covPx * lrpWt;
        const netAtFloor = revAtFloor - totalCost - premHd;
        lEl.textContent  = `Net at floor: ${netAtFloor>=0?'+':''}${money(netAtFloor)}/hd`;
        netEl.textContent= premHd>0 ? `${money(premHd)}/hd premium` : '';
        if(premHdEl) premHdEl.textContent = premHd>0 ? `$${premHd.toFixed(2)}/head total premium` : '';
        card.classList.remove('ok','bad');
        card.classList.add(netAtFloor>=0?'ok':'bad');
      } else {
        lEl.textContent   = `Max loss covered: ${money((rows[0]?.eev||0)*pct/100*lrpWt - r.covPx*lrpWt)}/hd`;
        netEl.textContent = '';
        if(premHdEl) premHdEl.textContent = lrpWt>0 ? `$${premHd.toFixed(2)}/head` : '';
        card.classList.remove('ok','bad');
      }

      // Add recommended badge
      if(pct===recommendedPct){
        const badge = document.createElement('div');
        badge.className = 'cov-recommended-badge';
        badge.textContent = '★ Recommended';
        card.appendChild(badge);
      }
    } else {
      // No data for this level — show manual entry prompt
      fEl.textContent   = `Floor: ${pct}% of EEV`;
      lEl.textContent   = 'No RMA quote at this level';
      premEl.textContent= '—';
      if(premHdEl) premHdEl.textContent = '';
      subEl.textContent  = '';
      netEl.textContent  = '';
      card.classList.remove('ok','bad');
    }
  });

  // Auto-select the recommended card
  const selCard = $(op+'-card-'+recommendedPct);
  if(selCard){
    $$(`#op-${op} .cov-card`).forEach(c=>c.classList.remove('sel'));
    selCard.classList.add('sel');
    activeCov[op] = recommendedPct;
    // Apply EEV and premium from recommended level to inputs
    const rec = byLevel[recommendedPct];
    if(rec){
      const eevEl  = $(op+'-lrp-eev');
      const premEl = $(op+'-lrp-prem');
      if(eevEl)  { eevEl.value=rec.eev.toFixed(2);    eevEl.style.background='var(--grn-p)'; eevEl.style.borderColor='var(--grn)'; }
      if(premEl) { premEl.value=rec.netPrem.toFixed(4); premEl.style.background='var(--grn-p)'; premEl.style.borderColor='var(--grn)'; }
    }
  }

  // Show results summary
  const eevDisplay = rows[0]?.eev?.toFixed(2)||'—';
  resultsEl.innerHTML = `<div style="padding:10px 2px;font-size:.74rem;color:var(--mist)">
    ✓ ${rows.length} coverage level${rows.length!==1?'s':''} loaded for <strong style="color:var(--gold-l)">${weeks}-week endorsement</strong> · EEV: <strong style="color:var(--gold-l)">$${eevDisplay}</strong> · As of ${dateStr}
    <span style="margin-left:12px;color:var(--hide-l)">Click any card below to select that coverage level</span>
  </div>`;

  if(hintEl) hintEl.textContent = '';
  if(covLbl) covLbl.innerHTML = `Select Coverage Level — <strong style="color:var(--gold-l)">${weeks}-week endorsement · ${dateStr}</strong> · ★ = recommended based on your breakeven`;

  setStatus(op,'ok',`${rows.length} coverage levels loaded · ${weeks}-week · As of ${dateStr}`);

  if(bar)  bar.classList.add('show');
  if(vals) vals.textContent = `${weeks}-week endorsement · End: ${$(op+'-fc-enddate')?.value||'—'} · ${rows.length} coverage levels`;

  calcLRP(op);
}

// New pickCov that also updates EEV/premium inputs from live data
function pickCovLive(op, pct, el){
  $$(`#op-${op} .cov-card`).forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  activeCov[op] = pct;

  // If live data exists for this op, populate inputs from stored data
  const live = lrpLiveData[op];
  if(live){
    const r = live.rows.find(row=>row.covPct===pct);
    if(r){
      const eevEl  = $(op+'-lrp-eev');
      const premEl = $(op+'-lrp-prem');
      if(eevEl)  { eevEl.value=r.eev.toFixed(2);     eevEl.style.background='var(--grn-p)'; eevEl.style.borderColor='var(--grn)'; }
      if(premEl) { premEl.value=r.netPrem.toFixed(4); premEl.style.background='var(--grn-p)'; premEl.style.borderColor='var(--grn)'; }
    }
  }
  calcLRP(op);
}

   UI INTERACTIONS
═══════════════════════════════════════════ */
function switchOp(op){
  $$('.op-panel').forEach(p=>p.classList.remove('on'));
  $$('.op-tab').forEach(t=>t.classList.remove('on'));
  $('op-'+op).classList.add('on');
  $('optab-'+op).classList.add('on');
}

function switchSec(op, sec, tabEl){
  $$('#op-'+op+' .sec').forEach(s=>s.classList.remove('on'));
  $$('#op-'+op+' .tab').forEach(t=>t.classList.remove('on'));
  $(op+'-'+sec).classList.add('on');
  tabEl.classList.add('on');
}

function pickCov(op, pct, el){ pickCovLive(op, pct, el); }

function clearAll(){
  if(!confirm('Clear all data? This cannot be undone.')) return;
  $$('input[type="number"],input[type="text"],input[type="date"],textarea').forEach(el=>{
    if(!el.readOnly) el.value='';
  });
  OPS.forEach(o=>{ recalc(o.id); calcFeed(o.id); calcPasture(o.id); });
}

$('p-date').value = new Date().toISOString().split('T')[0];
