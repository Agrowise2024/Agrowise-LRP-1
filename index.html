<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrowise — Feeder Cattle & LRP Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & ROOT ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#1a1206; --ink2:#2c1e0c; --ink3:#3e2e18;
  --gold:#c8a032; --gold-l:#e0be60; --gold-p:#fef9e8;
  --hide:#9a6428; --hide-l:#c49060; --hide-p:#fdf5e8;
  --grass:#3e5e22; --grass-l:#6a9040; --grass-p:#eef4e6;
  --sky:#2e5e7a;
  --cream:#f8f3e8; --cream2:#f0e8d4; --cream3:#ece0cc;
  --stone:#7a7060; --mist:#b0a890; --fog:#d8d0c0;
  --red:#a82020; --red-p:#fbeaea; --red-b:#e8a0a0;
  --grn:#246e18; --grn-p:#eaf5e6; --grn-b:#90cc80;
  --warn:#9a5a10;
}

body{font-family:'Barlow',sans-serif;font-weight:300;background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px}

/* ─── TOP BAR ─── */
.bar{background:var(--ink);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;gap:12px}
.bar-l{display:flex;align-items:center;gap:14px;min-width:0}
.logo{font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;color:var(--cream);white-space:nowrap}
.logo b{color:var(--gold)}
.pill{background:var(--hide-l);color:var(--ink);font-size:0.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;white-space:nowrap;flex-shrink:0}
.bar-title{font-size:0.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mist);white-space:nowrap}
.bar-r{display:flex;gap:8px;flex-shrink:0}
.btn{font-family:'Barlow',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border:none;cursor:pointer;white-space:nowrap;transition:background .12s}
.btn-ghost{background:transparent;color:var(--mist);border:1px solid rgba(255,255,255,.15)}
.btn-ghost:hover{color:var(--cream);border-color:rgba(255,255,255,.4)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:var(--gold-l)}

/* ─── LAYOUT ─── */
.wrap{display:grid;grid-template-columns:252px 1fr;min-height:calc(100vh - 50px)}

/* ─── SIDEBAR ─── */
.side{background:var(--ink2);border-right:1px solid rgba(255,255,255,.05);padding:20px 0;position:sticky;top:50px;height:calc(100vh - 50px);overflow-y:auto}
.s-sec{padding:0 16px 16px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:16px}
.s-lbl{font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mist);margin-bottom:9px}
.s-fields{display:flex;flex-direction:column;gap:7px}
.sf label{font-size:.62rem;color:var(--mist);display:block;margin-bottom:2px}
.sf input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--cream);font-family:'Barlow',sans-serif;font-size:.78rem;padding:6px 8px;outline:none}
.sf input:focus{border-color:var(--gold)}
.sf input::placeholder{color:rgba(255,255,255,.2)}

/* op tabs */
.op-tabs{display:flex;flex-direction:column}
.op-tab{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .12s}
.op-tab:hover{background:rgba(255,255,255,.03)}
.op-tab.on{background:rgba(196,144,96,.1);border-left-color:var(--hide-l)}
.op-tab-name{font-size:.78rem;color:var(--cream)}
.op-tab-val{font-size:.66rem;color:var(--mist)}
.op-tab.on .op-tab-val{color:var(--hide-l)}

/* summary */
.s-sum{background:rgba(255,255,255,.03);padding:11px}
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sr:last-child{border-bottom:none;padding-top:8px}
.sr-l{font-size:.66rem;color:var(--mist)}
.sr-v{font-family:'Libre Baskerville',serif;font-size:.8rem;color:var(--cream)}
.sr-v.hi{color:var(--hide-l);font-size:.9rem}

/* ─── MAIN ─── */
.main{padding:22px 26px 60px}

/* op panels */
.op-panel{display:none}
.op-panel.on{display:block}

/* section tabs */
.tabs{display:flex;border-bottom:2px solid var(--cream3);margin-bottom:20px}
.tab{padding:8px 18px;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .14s}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--hide);border-bottom-color:var(--hide);font-weight:600}

.sec{display:none}
.sec.on{display:block}

/* op header */
.op-hdr{margin-bottom:18px}
.op-title{font-family:'Libre Baskerville',serif;font-size:1.3rem;font-weight:700;margin-bottom:3px}
.op-title em{color:var(--hide-l);font-style:italic}
.op-sub{font-size:.76rem;color:var(--stone);max-width:500px;line-height:1.55}

/* meta row */
.meta{display:flex;flex-wrap:wrap;gap:10px;background:white;border:1px solid var(--fog);padding:13px 15px;margin-bottom:16px;align-items:flex-end}
.mf{display:flex;flex-direction:column;gap:3px}
.mf label{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--stone)}
.mf input{background:var(--cream2);border:1px solid var(--cream3);font-family:'Barlow',sans-serif;font-size:.8rem;color:var(--ink);padding:6px 8px;outline:none;width:112px}
.mf input:focus{border-color:var(--gold)}
.mf-u{font-size:.66rem;color:var(--stone);padding-bottom:8px}

/* cost table */
.ctbl{width:100%;border-collapse:collapse;margin-bottom:16px}
.ctbl thead tr{background:var(--ink);color:var(--cream)}
.ctbl thead th{padding:8px 11px;font-size:.56rem;letter-spacing:.11em;text-transform:uppercase;font-weight:500;text-align:left}
.ctbl thead th:not(:first-child){text-align:right}
.ctbl tbody tr{border-bottom:1px solid #ede8dc;background:white}
.ctbl tbody tr:nth-child(even){background:#fdfaf3}
.ctbl tbody tr:hover{background:var(--gold-p)}
.ctbl td{padding:0}
.c-lbl{padding:9px 11px;font-size:.78rem;color:var(--ink);white-space:nowrap}
.c-ico{margin-right:6px}
.c-in{padding:4px 5px;text-align:right}
.c-in input{width:106px;text-align:right;background:transparent;border:1px solid transparent;font-family:'Barlow',sans-serif;font-size:.78rem;color:var(--ink);padding:5px 7px;outline:none;transition:border .12s,background .12s}
.c-in input:focus{border-color:var(--gold);background:var(--gold-p)}
.c-in input::placeholder{color:#ccc}
.c-in input[readonly]{color:var(--stone);font-style:italic;cursor:default}
.c-cm{padding:9px 11px;text-align:right;font-size:.78rem;color:#bbb;min-width:104px}
.c-cm.v{color:var(--ink);font-weight:500}
.ctbl tfoot tr{background:var(--ink2);color:var(--cream)}
.ctbl tfoot td{padding:10px 11px}
.ft-l{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mist)}
.ft-v{font-family:'Libre Baskerville',serif;font-size:.94rem;color:var(--gold-l);text-align:right;font-weight:700}

/* breakeven strip */
.be-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid var(--fog);overflow:hidden;margin-bottom:16px}
.be-blk{padding:15px 16px;background:white;border-right:1px solid var(--fog)}
.be-blk:last-child{border-right:none;background:var(--ink)}
.be-lbl{font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);margin-bottom:3px}
.be-blk:last-child .be-lbl{color:var(--mist)}
.be-val{font-family:'Libre Baskerville',serif;font-size:1.3rem;font-weight:700;color:var(--ink);line-height:1;margin-bottom:2px}
.be-blk:last-child .be-val{color:var(--hide-l)}
.be-u{font-size:.66rem;color:var(--stone)}
.be-blk:last-child .be-u{color:var(--mist)}
.be-tgt{display:flex;align-items:center;gap:6px;margin-top:8px}
.be-tgt label{font-size:.6rem;color:var(--mist);white-space:nowrap}
.be-tgt input{width:78px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--cream);font-family:'Barlow',sans-serif;font-size:.78rem;padding:4px 6px;outline:none}
.be-tgt input:focus{border-color:var(--gold)}
.be-net{font-size:.72rem;color:var(--mist);margin-top:5px}
.be-net span{font-weight:600}

/* risk bar */
.risk{margin-bottom:16px}
.risk-lbl{font-size:.56rem;letter-spacing:.13em;text-transform:uppercase;color:var(--stone);margin-bottom:6px}
.risk-track{height:10px;background:linear-gradient(90deg,#246e18,#c8a032,#a82020);border-radius:5px;position:relative;margin-bottom:4px}
.risk-pin{width:3px;height:19px;background:var(--ink);position:absolute;top:-5px;transform:translateX(-50%);border-radius:1px;transition:left .3s}
.risk-pin::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--ink)}
.risk-ends{display:flex;justify-content:space-between;font-size:.58rem;color:var(--stone)}
.risk-msg{margin-top:6px;padding:8px 12px;font-size:.76rem;font-weight:500;line-height:1.45}
.risk-msg.g{background:var(--grn-p);color:var(--grn);border-left:3px solid var(--grn)}
.risk-msg.w{background:#fef5e0;color:var(--warn);border-left:3px solid var(--warn)}
.risk-msg.r{background:var(--red-p);color:var(--red);border-left:3px solid var(--red)}

/* notes */
.notes{margin-bottom:16px}
.notes label{font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);display:block;margin-bottom:5px}
.notes textarea{width:100%;background:white;border:1px solid var(--fog);font-family:'Barlow',sans-serif;font-size:.78rem;color:var(--ink);padding:10px 12px;resize:vertical;min-height:68px;outline:none;line-height:1.55}
.notes textarea:focus{border-color:var(--gold)}

/* ─── LRP ─── */
.lrp-hero{background:var(--ink);border-left:4px solid var(--hide-l);padding:16px 20px;margin-bottom:16px}
.lrp-hero h3{font-family:'Libre Baskerville',serif;font-size:1rem;font-weight:700;color:var(--cream);margin-bottom:5px}
.lrp-hero p{font-size:.76rem;color:var(--mist);line-height:1.6}

.lrp-3col{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--fog);overflow:hidden;margin-bottom:16px}
.l3{padding:14px 14px;background:white;border-right:1px solid var(--fog)}
.l3:last-child{border-right:none}
.l3-ico{font-size:1.1rem;margin-bottom:5px}
.l3-title{font-family:'Libre Baskerville',serif;font-size:.84rem;font-weight:700;margin-bottom:4px}
.l3-desc{font-size:.72rem;color:var(--stone);line-height:1.5}

.lrp-inputs{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--fog);overflow:hidden;margin-bottom:16px}
.li{padding:13px 13px;background:white;border-right:1px solid var(--fog)}
.li:last-child{border-right:none}
.li-lbl{font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-bottom:4px}
.li input{width:100%;background:var(--cream2);border:1px solid var(--cream3);font-family:'Barlow',sans-serif;font-size:.8rem;color:var(--ink);padding:7px 8px;outline:none}
.li input:focus{border-color:var(--hide-l)}
.li-hint{font-size:.62rem;color:var(--stone);margin-top:3px;font-style:italic;line-height:1.35}

/* coverage cards */
.cov-lbl{font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--stone);margin-bottom:8px}
.cov-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}

.cov-card{
  background:white;
  border:2px solid var(--cream3);
  padding:12px 8px 10px;
  text-align:center;
  cursor:pointer;
  transition:border-color .18s,background .18s;
  position:relative;
  min-height:100px;
}
.cov-card:hover{border-color:var(--hide-l);background:var(--hide-p)}
/* selected neutral */
.cov-card.sel{border-color:var(--hide);background:var(--hide-p)}
.cov-card.sel::after{content:'✓';position:absolute;top:5px;right:7px;font-size:.6rem;color:var(--hide);font-weight:700}
/* protected: floor covers costs + premium */
.cov-card.ok{border-color:var(--grn) !important;background:var(--grn-p) !important}
.cov-card.ok.sel{background:#ddf0d8 !important}
.cov-card.ok::after{color:var(--grn) !important}
/* at-risk: floor does NOT cover costs + premium */
.cov-card.bad{border-color:var(--red) !important;background:var(--red-p) !important}
.cov-card.bad.sel{background:#f5d8d8 !important}
.cov-card.bad::after{color:var(--red) !important}

.cov-pct{font-family:'Libre Baskerville',serif;font-size:1.2rem;font-weight:700;color:var(--ink);line-height:1;margin-bottom:3px}
.cov-card.ok  .cov-pct{color:var(--grn)}
.cov-card.bad .cov-pct{color:var(--red)}
.cov-floor{font-size:.66rem;color:var(--stone);margin-bottom:4px}
.cov-loss{font-size:.68rem;font-weight:600;margin-bottom:2px;color:var(--stone)}
.cov-card.ok  .cov-loss{color:var(--grn)}
.cov-card.bad .cov-loss{color:var(--red)}
.cov-net{font-size:.6rem;font-style:italic;color:var(--stone)}
.cov-card.ok  .cov-net{color:var(--grn)}
.cov-card.bad .cov-net{color:var(--red)}

/* comparison */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cmp-col{border:1px solid var(--fog);overflow:hidden}
.cmp-head{padding:11px 15px;font-family:'Libre Baskerville',serif;font-size:.86rem;font-weight:700;display:flex;align-items:center;gap:7px}
.cmp-head.un{background:#faeae0;color:var(--red)}
.cmp-head.ins{background:var(--grn-p);color:var(--grn)}
.cmp-body{background:white}
.cmp-row{display:flex;justify-content:space-between;padding:8px 15px;border-bottom:1px solid #f0e8d8;font-size:.77rem}
.cmp-row:last-child{border-bottom:none}
.cmp-rl{color:var(--stone)}
.cmp-rv{font-weight:500;color:var(--ink)}
.cmp-rv.pos{color:var(--grn)}
.cmp-rv.neg{color:var(--red)}
.cmp-foot{padding:10px 15px;font-family:'Libre Baskerville',serif;font-size:.9rem;font-weight:700;display:flex;justify-content:space-between}
.cmp-foot.un{background:#fdf0e8;color:var(--red)}
.cmp-foot.ins{background:#eef8e8;color:var(--grn)}

/* scenario bars */
.scen{margin-bottom:16px}
.scen-lbl{font-size:.56rem;letter-spacing:.13em;text-transform:uppercase;color:var(--stone);margin-bottom:9px}
.scen-bars{display:flex;flex-direction:column;gap:5px}
.scen-row{display:grid;grid-template-columns:108px 1fr 124px;gap:8px;align-items:center}
.scen-name{font-size:.72rem;color:var(--ink);text-align:right}
.scen-track{height:24px;background:var(--cream3);position:relative;overflow:hidden;border-radius:1px}
.s-un{height:100%;position:absolute;top:0;left:0;transition:width .3s}
.s-in{height:12px;position:absolute;bottom:0;left:0;transition:width .3s}
.scen-vals{font-size:.67rem;font-weight:600;display:flex;flex-direction:column;gap:1px}
.scen-legend{display:flex;gap:14px;margin-top:7px}
.sl{display:flex;align-items:center;gap:5px;font-size:.62rem;color:var(--stone)}
.sl-sw{width:12px;height:7px;border-radius:1px}

/* ─── COST BUILDER WIZARD ─── */
.wizard{border:1px solid var(--hide-l);overflow:hidden;margin-bottom:16px;border-radius:1px}
.wizard-hdr{background:var(--ink2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.wizard-hdr:hover{background:var(--ink3)}
.wizard-title{font-family:'Libre Baskerville',serif;font-size:.88rem;font-weight:700;color:var(--cream);display:flex;align-items:center;gap:8px}
.wizard-title span{font-family:'Barlow',sans-serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;background:var(--hide-l);color:var(--ink);padding:2px 8px;font-weight:700}
.wizard-toggle{font-size:.7rem;color:var(--mist);display:flex;align-items:center;gap:6px}
.wizard-arrow{transition:transform .2s;display:inline-block}
.wizard-arrow.open{transform:rotate(180deg)}
.wizard-body{display:none;background:var(--cream);padding:16px}
.wizard-body.open{display:block}

.wiz-section{margin-bottom:20px}
.wiz-section:last-child{margin-bottom:0}
.wiz-sec-title{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--hide);font-weight:700;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--cream3)}

/* feed ingredient grid */
.feed-grid{display:grid;grid-template-columns:1fr 120px 100px 110px;gap:0;border:1px solid var(--fog);overflow:hidden;margin-bottom:8px}
.feed-grid-hdr{background:var(--ink);color:var(--cream);font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 10px}
.feed-row{display:contents}
.feed-row > div{background:white;border-top:1px solid var(--fog);padding:5px 8px;display:flex;align-items:center}
.feed-row:nth-child(odd) > div{background:#fdfaf3}
.feed-row > div:not(:first-child){border-left:1px solid var(--fog)}
.feed-cell-lbl{font-size:.74rem;color:var(--ink)}
.feed-in{width:100%;background:transparent;border:none;font-family:'Barlow',sans-serif;font-size:.78rem;color:var(--ink);padding:3px 4px;outline:none;text-align:right}
.feed-in:focus{background:var(--gold-p)}
.feed-total-row{display:grid;grid-template-columns:1fr 120px 100px 110px;background:var(--ink2)}
.feed-total-row > div{padding:7px 10px;font-size:.75rem}
.feed-total-lbl{color:var(--mist);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase}
.feed-total-val{color:var(--gold-l);font-family:'Libre Baskerville',serif;font-weight:700;text-align:right}
.feed-custom-rows{display:contents}

/* interest builder */
.int-grid{display:grid;grid-template-columns:1fr 140px;gap:8px 14px;align-items:center;margin-bottom:10px}
.int-lbl{font-size:.76rem;color:var(--ink)}
.int-sub{font-size:.63rem;color:var(--stone);margin-top:1px}
.int-in{background:var(--cream2);border:1px solid var(--cream3);font-family:'Barlow',sans-serif;font-size:.8rem;color:var(--ink);padding:6px 8px;outline:none;width:100%;text-align:right}
.int-in:focus{border-color:var(--hide-l)}
.int-in[readonly]{color:var(--stone);font-style:italic;background:var(--fog)}
.int-result{background:var(--ink2);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.int-result-lbl{font-size:.66rem;color:var(--mist);letter-spacing:.08em;text-transform:uppercase}
.int-result-val{font-family:'Libre Baskerville',serif;font-size:1rem;color:var(--hide-l);font-weight:700}

/* pasture builder */
.past-grid{display:grid;grid-template-columns:1fr 140px;gap:8px 14px;align-items:center;margin-bottom:10px}
.past-result{background:var(--ink2);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.past-result-lbl{font-size:.66rem;color:var(--mist);letter-spacing:.08em;text-transform:uppercase}
.past-result-val{font-family:'Libre Baskerville',serif;font-size:1rem;color:var(--hide-l);font-weight:700}

/* death loss builder */
.death-grid{display:grid;grid-template-columns:1fr 140px;gap:8px 14px;align-items:center;margin-bottom:10px}
.death-result{background:var(--ink2);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}

/* apply button */
.wiz-apply{margin-top:14px;display:flex;align-items:center;gap:10px}
.btn-apply{font-family:'Barlow',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 20px;border:none;cursor:pointer;background:var(--hide);color:var(--cream);transition:background .12s}
.btn-apply:hover{background:var(--hide-l);color:var(--ink)}
.wiz-apply-note{font-size:.66rem;color:var(--stone);font-style:italic}
.wiz-applied{font-size:.66rem;color:var(--grn);font-weight:600;display:none}

/* ─── COW/CALF WIZARD (Spring Calves) ─── */
.cc-wizard{border:2px solid var(--grass-l);overflow:hidden;margin-bottom:16px}
.cc-wizard-hdr{background:var(--ink2);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.cc-wizard-hdr:hover{background:var(--ink3)}
.cc-wizard-title{font-family:'Libre Baskerville',serif;font-size:.92rem;font-weight:700;color:var(--cream);display:flex;align-items:center;gap:10px}
.cc-wizard-title span{font-family:'Barlow',sans-serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;background:var(--grass-l);color:var(--ink);padding:2px 9px;font-weight:700}
.cc-wizard-toggle{font-size:.7rem;color:var(--mist);display:flex;align-items:center;gap:6px}
.cc-arrow{transition:transform .2s;display:inline-block}
.cc-arrow.open{transform:rotate(180deg)}
.cc-wizard-body{display:none;background:var(--cream)}

.cc-result-bar{background:var(--ink);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-top:2px solid var(--grass-l)}
.cc-result-lbl{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mist)}
.cc-result-val{font-family:'Libre Baskerville',serif;font-size:1.3rem;font-weight:700;color:var(--gold-l)}
.cc-result-sub{font-size:.64rem;color:var(--mist);margin-top:2px}
.cc-section{border-bottom:1px solid var(--fog);background:white}
.cc-section:last-child{border-bottom:none}
.cc-section-hdr{background:#f7f9f4;padding:10px 16px;display:flex;align-items:center;gap:10px}
.cc-section-ico{font-size:1rem}
.cc-section-title{font-family:'Libre Baskerville',serif;font-size:.88rem;font-weight:700;flex:1}
.cc-section-result{font-size:.72rem;color:var(--grass);font-weight:600;min-width:120px;text-align:right}
.cc-body{padding:14px 16px}
.cc-grid2{display:grid;grid-template-columns:1fr 110px;gap:8px;align-items:center}
.cc-grid3{display:grid;grid-template-columns:1fr 120px 110px;gap:8px;align-items:center}
.cc-grid4{display:grid;grid-template-columns:1fr 120px 120px 110px;gap:8px;align-items:center}
.cc-grid5{display:grid;grid-template-columns:1fr 90px 90px 90px 110px;gap:8px;align-items:center}
.cc-lbl{font-size:.74rem;color:var(--ink);line-height:1.3}
.cc-lbl small{display:block;font-size:.64rem;color:var(--stone);margin-top:1px}
.cc-hdr{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);text-align:right}
.cc-in{background:var(--cream2);border:1px solid var(--cream3);font-family:'Barlow',sans-serif;font-size:.8rem;color:var(--ink);padding:6px 8px;outline:none;text-align:right;width:100%}
.cc-in:focus{border-color:var(--grass-l)}
.cc-in::placeholder{color:#bbb}
.cc-in[readonly]{color:var(--stone);font-style:italic;background:var(--fog)}
.cc-computed{font-family:'Libre Baskerville',serif;font-size:.86rem;font-weight:700;color:var(--grass);text-align:right;padding:6px 0}
.cc-formula{font-size:.62rem;color:var(--stone);font-style:italic;margin-top:4px;line-height:1.5}
.cc-path{background:var(--cream2);padding:8px 10px;margin-bottom:8px;border-left:3px solid var(--grass-l)}
.cc-path-b{background:var(--cream2);padding:8px 10px;border-left:3px solid var(--sky)}
.cc-path-lbl{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.cc-total-bar{background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.cc-total-lbl{font-size:.6rem;letter-spacing:.11em;text-transform:uppercase;color:var(--mist)}
.cc-total-val{font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;color:var(--gold-l)}
.cc-total-sub{font-size:.64rem;color:var(--mist);margin-top:1px}
.cc-auto-note{background:var(--grass-p);border-top:1px solid var(--fog);padding:9px 16px;font-size:.7rem;color:var(--grass);font-style:italic}
.cc-depr-cols{display:grid;grid-template-columns:1fr 1fr;gap:0}
.cc-depr-col{padding:16px 18px;border-right:1px solid var(--fog)}
.cc-depr-col:last-child{border-right:none}
.cc-depr-result{margin-top:12px;padding:11px 14px;background:var(--ink);display:flex;align-items:center;justify-content:space-between}
.cc-sky{color:var(--sky)}
.cc-misc-row{display:grid;grid-template-columns:1fr 120px 110px;gap:8px;align-items:center;margin-bottom:6px}
.cc-misc-name{background:var(--cream2);border:1px solid var(--cream3);font-family:'Barlow',sans-serif;font-size:.78rem;color:var(--ink);padding:6px 8px;outline:none;width:100%}
.cc-misc-name::placeholder{color:#bbb}
.cc-summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:0;background:var(--ink3);border-top:2px solid var(--gold)}
.cc-sum-blk{padding:12px 14px;border-right:1px solid rgba(255,255,255,.08)}
.cc-sum-blk:last-child{border-right:none}
.cc-sum-lbl{font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);margin-bottom:3px}
.cc-sum-val{font-family:'Libre Baskerville',serif;font-size:1rem;font-weight:700;color:var(--gold-l)}

/* ─── LRP LIVE QUOTE FETCHER ─── */
.lrp-fetch-panel{background:var(--ink2);border:2px solid var(--gold);margin-bottom:20px;overflow:hidden}
.lrp-fetch-hdr{background:var(--ink);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.lrp-fetch-title{font-family:'Libre Baskerville',serif;font-size:.95rem;font-weight:700;color:var(--cream);display:flex;align-items:center;gap:10px}
.lrp-fetch-badge{font-family:'Barlow',sans-serif;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;background:var(--gold);color:var(--ink);padding:2px 9px;font-weight:700}
.lrp-fetch-status{font-size:.66rem;color:var(--mist);display:flex;align-items:center;gap:6px}
.lrp-status-dot{width:8px;height:8px;border-radius:50%;background:var(--stone);flex-shrink:0;transition:background .3s}
.lrp-status-dot.loading{background:var(--gold);animation:pulse 1s infinite}
.lrp-status-dot.ok{background:var(--grn)}
.lrp-status-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.lrp-fetch-body{padding:16px 18px}
.lrp-fetch-selectors{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;align-items:end;margin-bottom:14px}
.lrp-date-hint{font-size:.62rem;color:var(--hide-l);margin-top:3px;font-style:italic}
.lrp-sel-group{display:flex;flex-direction:column;gap:4px}
.lrp-sel-lbl{font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mist)}
.lrp-sel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--cream);font-family:'Barlow',sans-serif;font-size:.8rem;padding:7px 10px;outline:none;cursor:pointer;width:100%}
.lrp-sel:focus{border-color:var(--gold)}
.lrp-sel option{background:var(--ink2);color:var(--cream)}
.btn-fetch{font-family:'Barlow',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 20px;border:none;cursor:pointer;background:var(--gold);color:var(--ink);white-space:nowrap;transition:background .12s;height:36px}
.btn-fetch:hover{background:var(--gold-l)}
.btn-fetch:disabled{background:var(--stone);color:var(--mist);cursor:not-allowed}

/* Results table */
.lrp-results-wrap{overflow-x:auto}
.lrp-results-tbl{width:100%;border-collapse:collapse;font-size:.76rem}
.lrp-results-tbl thead tr{background:var(--ink3)}
.lrp-results-tbl thead th{padding:7px 10px;color:var(--mist);font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;text-align:left;white-space:nowrap}
.lrp-results-tbl thead th:not(:first-child){text-align:right}
.lrp-results-tbl tbody tr{border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .1s}
.lrp-results-tbl tbody tr:hover{background:rgba(196,144,96,.12)}
.lrp-results-tbl tbody tr.lrp-row-sel{background:rgba(196,144,96,.2);outline:2px solid var(--gold) inset}
.lrp-results-tbl td{padding:8px 10px;color:var(--cream);white-space:nowrap}
.lrp-results-tbl td:not(:first-child){text-align:right;font-family:'Libre Baskerville',serif}
.lrp-row-weeks{font-weight:600;color:var(--gold-l)}
.lrp-row-end{color:var(--mist);font-size:.72rem}
.lrp-row-eev{color:var(--gold-l)}
.lrp-row-prem{color:var(--cream)}
.lrp-row-net{color:var(--grn-b)}
.lrp-row-sub{color:var(--mist);font-size:.68rem}
.lrp-select-hint{font-size:.64rem;color:var(--hide-l);font-style:italic;padding:4px 2px 0}

/* Applied bar */
.lrp-applied-bar{background:var(--grass);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;display:none}
.lrp-applied-bar.show{display:flex}
.lrp-applied-lbl{font-size:.7rem;color:var(--grn-p);font-weight:600}
.lrp-applied-vals{font-size:.76rem;color:white;font-family:'Libre Baskerville',serif}

/* No-data / error states */
.lrp-fetch-msg{padding:20px;text-align:center;color:var(--mist);font-size:.8rem;font-style:italic}
.lrp-fetch-msg.err{color:var(--red-b)}

/* ─── LIVE COVERAGE CARDS (data-driven) ─── */
.cov-card-live{position:relative;overflow:hidden}
.cov-card-live .cov-prem{font-size:.7rem;color:var(--mist);margin-top:2px}
.cov-card-live .cov-prem b{color:var(--cream);font-size:.82rem}
.cov-card-live .cov-sub-saved{font-size:.62rem;color:var(--hide-l);margin-top:1px}
.cov-card-live .cov-prem-hd{font-size:.68rem;color:var(--gold-l);margin-top:3px;font-weight:600}
.cov-card-live.loading{opacity:.5}
.cov-recommended-badge{position:absolute;top:0;right:0;background:var(--gold);color:var(--ink);font-size:.48rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px}

/* ─── RESPONSIVE ─── */
@media(max-width:820px){
  .wrap{grid-template-columns:1fr}
  .side{position:static;height:auto}
  .be-strip{grid-template-columns:1fr}
  .be-blk{border-right:none;border-bottom:1px solid var(--fog)}
  .be-blk:last-child{border-bottom:none}
  .cov-row{grid-template-columns:repeat(3,1fr)}
  .cmp{grid-template-columns:1fr}
  .lrp-inputs{grid-template-columns:1fr 1fr}
  .lrp-3col{grid-template-columns:1fr}
  .l3{border-right:none;border-bottom:1px solid var(--fog)}
}
@media print{
  .bar{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .side{display:none}
  .wrap{grid-template-columns:1fr}
  .op-panel,.sec{display:block !important}
  .ctbl thead tr,.ctbl tfoot tr{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .bar-r{display:none}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="bar">
  <div class="bar-l">
    <div class="logo"><b>Agro</b>wise</div>
    <div class="pill">Step 1 · Feeder Cattle</div>
    <div class="bar-title">Input Cost &amp; LRP Analysis</div>
  </div>
  <div class="bar-r">
    <button class="btn btn-ghost" onclick="clearAll()">Clear All</button>
    <button class="btn btn-gold"  onclick="window.print()">Print / Save PDF</button>
  </div>
</header>

<div class="wrap">

  <!-- SIDEBAR -->
  <aside class="side">
    <div class="s-sec">
      <div class="s-lbl">Producer Information</div>
      <div class="s-fields">
        <div class="sf"><label>Producer Name</label><input id="p-name"   type="text" placeholder="e.g. Johnson Ranch"></div>
        <div class="sf"><label>Operation Type</label><input id="p-type"  type="text" placeholder="e.g. Stocker / Cow-Calf"></div>
        <div class="sf"><label>County / State</label><input id="p-loc"   type="text" placeholder="e.g. Haskell Co., KS"></div>
        <div class="sf"><label>Crop Year</label>     <input id="p-year"  type="text" placeholder="e.g. 2025"></div>
        <div class="sf"><label>Agent Name</label>    <input id="p-agent" type="text" placeholder="Agrowise Agent"></div>
        <div class="sf"><label>Date</label>          <input id="p-date"  type="date"></div>
      </div>
    </div>

    <div class="s-sec">
      <div class="s-lbl">Operation Type</div>
      <div class="op-tabs" id="op-tabs"></div>
    </div>

    <div class="s-sec">
      <div class="s-lbl">All Operations Summary</div>
      <div class="s-sum" id="s-sum"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<footer style="background:var(--ink2);color:var(--mist);padding:14px 24px;display:flex;justify-content:space-between;font-size:.66rem;letter-spacing:.04em;flex-wrap:wrap;gap:8px">
  <span><strong style="color:var(--gold);font-weight:500">Agrowise</strong> — Feeder Cattle Input Cost &amp; LRP Calculator</span>
  <span>Step 1 · Guaranteed Financial Insight · Field-First Method</span>
</footer>

<script>
/* ═══════════════════════════════════════════
   DATA DEFINITIONS
═══════════════════════════════════════════ */
const OPS = [
  {id:'stocker',    em:'🐄', name:'Stocker / Grass Cattle',
   desc:'Buy light stockers, graze on grass, sell heavier. Risk lies in purchase price, grazing costs, and the feeder cattle market at sale time.',
   daysLabel:'Days on Grass'},
  {id:'background', em:'🌱', name:'Background / Grower',
   desc:'Receive lighter cattle, grow on a mix of forage and supplemental feed before moving to a feedlot or direct marketing.',
   daysLabel:'Days on Feed'},
  {id:'feedlot',    em:'🏗️', name:'Feedlot Finishing',
   desc:'Buy feeder cattle, finish on a high-energy ration, sell as fat cattle. High cost-of-gain with concentrated price risk at sale.',
   daysLabel:'Days on Feed'},
  {id:'springcalf', em:'🌱', name:'Spring Calves',
   desc:'Cow/calf spring calving operation. Calves born in spring, weaned and sold in fall. Cost basis built from the Cow/Calf Cost of Production Wizard.',
   daysLabel:'Days on Grass', ccWizard:true},
  {id:'fallcalf',   em:'🍂', name:'Fall Calves',
   desc:'Cow/calf fall calving operation. Calves born in fall, wintered on the cow, weaned and sold in spring/summer. Cost basis built from the Cow/Calf Cost of Production Wizard.',
   daysLabel:'Days on Grass', ccWizard:true},
];

const CATS = [
  {key:'purchase', ico:'🐄', lbl:'Purchase Price of Cattle',   auto:true,  tip:'Auto-calculated: head × buy weight × buy price ÷ 100'},
  {key:'feed',     ico:'🌾', lbl:'Feed Costs (hay, silage, grain)', tip:'Total feed cost per head for the feeding period'},
  {key:'pasture',  ico:'🏡', lbl:'Pasture / Grazing Lease',    tip:'Per-head share of pasture or grazing lease cost'},
  {key:'vet',      ico:'💉', lbl:'Veterinary & Medicine',      tip:'Processing, vaccines, treatments per head'},
  {key:'trucking', ico:'🚛', lbl:'Trucking & Marketing Fees',  tip:'Buy/sell trucking, commission, yardage at sale'},
  {key:'interest', ico:'💰', lbl:'Interest / Cost of Capital', tip:'Interest on purchase price + operating costs for the period'},
  {key:'labor',    ico:'👤', lbl:'Yardage / Labor',            tip:'Daily yardage or per-head labor allocation'},
  {key:'death',    ico:'📉', lbl:'Death Loss Allowance',       tip:'Estimated death loss as a $/head cost (typically 1–2% of purchase)'},
  {key:'misc',     ico:'📦', lbl:'Miscellaneous / Other',      tip:'Bedding, utilities, ear tags, other costs'},
];

const COV_PCTS   = [70, 80, 90, 95, 100];
const activeCov  = {};  // {opId: pct}
OPS.forEach(o => activeCov[o.id] = 90);

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
const $  = id  => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);

function money(n, dec=2){
  if(n===null||n===undefined||isNaN(n)) return '—';
  const abs = Math.abs(n).toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return (n<0?'-$':'$')+abs;
}

function numIn(id){ return parseFloat($(id)?.value)||0; }

/* ═══════════════════════════════════════════
   BUILD DOM
═══════════════════════════════════════════ */
function build(){
  // Sidebar op tabs
  $('op-tabs').innerHTML = OPS.map((o,i)=>`
    <div class="op-tab${i===0?' on':''}" onclick="switchOp('${o.id}')" id="optab-${o.id}">
      <span class="op-tab-name">${o.em} ${o.name}</span>
      <span class="op-tab-val"  id="tabval-${o.id}">—</span>
    </div>`).join('');

  // Sidebar summary
  $('s-sum').innerHTML =
    OPS.map(o=>`<div class="sr"><span class="sr-l">${o.em} ${o.name.split(' ')[0]+' '+o.name.split(' ')[1]} ($/hd)</span><span class="sr-v" id="sumv-${o.id}">—</span></div>`).join('')+
    `<div class="sr"><span class="sr-l">Lowest breakeven ($/cwt)</span><span class="sr-v hi" id="sumv-be">—</span></div>`;

  // Main op panels
  $('main').innerHTML = OPS.map((o,i)=>`
<div class="op-panel${i===0?' on':''}" id="op-${o.id}">
  <div class="op-hdr">
    <div class="op-title">${o.em} <em>${o.name}</em></div>
    <div class="op-sub">${o.desc}</div>
  </div>
  <div class="tabs">
    <div class="tab on"  onclick="switchSec('${o.id}','costs',this)">📋 Input Costs</div>
    <div class="tab"     onclick="switchSec('${o.id}','lrp',this)"  >🛡️ LRP Analysis</div>
  </div>

  <!-- ── COSTS ── -->
  <div class="sec on" id="${o.id}-costs">
    ${o.ccWizard ? `
    <!-- COW/CALF OP: meta has only sell-side fields; buy-side comes from wizard -->
    <div class="meta">
      <div class="mf"><label>Sell Weight (lbs)</label>
        <input type="number" id="${o.id}-sellwt" placeholder="0" min="0" oninput="recalc('${o.id}')"></div>
      <div class="mf"><label>${o.daysLabel}</label>
        <input type="number" id="${o.id}-days"   placeholder="0" min="0" oninput="recalc('${o.id}')"></div>
      <input type="hidden" id="${o.id}-head" value="">
      <input type="hidden" id="${o.id}-buywt" value="">
      <input type="hidden" id="${o.id}-buyprice" value="">
    </div>

    <!-- COW/CALF COST WIZARD -->
    <div class="cc-wizard">
      <div class="cc-wizard-hdr" onclick="toggleCCWizard('${o.id}')">
        <div class="cc-wizard-title">🐄 Cow/Calf Cost of Production Wizard <span>Sets Purchase Cost &amp; Head Count</span></div>
        <div class="cc-wizard-toggle">Click to expand <span class="cc-arrow" id="${o.id}-cc-arrow">▼</span></div>
      </div>
      <div class="cc-wizard-body" id="${o.id}-cc-wzbody">

        <!-- HERD SETUP -->
        <div class="cc-section">
          <div class="cc-section-hdr"><span class="cc-section-ico">📋</span><span class="cc-section-title">Herd Setup</span></div>
          <div class="cc-body">
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
              <div>
                <div class="cc-hdr" style="text-align:left;margin-bottom:4px">Number of Cows</div>
                <input class="cc-in" type="number" id="${o.id}-cc-cows" placeholder="e.g. 150" min="0" oninput="recalcCC('${o.id}')">
              </div>
              <div>
                <div class="cc-hdr" style="text-align:left;margin-bottom:4px">Calf Crop %</div>
                <input class="cc-in" type="number" id="${o.id}-cc-calvepct" placeholder="e.g. 88" min="0" max="100" oninput="recalcCC('${o.id}')">
              </div>
              <div>
                <div class="cc-hdr" style="text-align:left;margin-bottom:4px">Death Loss at Birth %</div>
                <input class="cc-in" type="number" id="${o.id}-cc-deathloss" placeholder="e.g. 2" min="0" max="20" step="0.5" oninput="recalcCC('${o.id}')">
              </div>
              <div>
                <div class="cc-hdr" style="text-align:left;margin-bottom:4px">Calves Sold (calc)</div>
                <div style="font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;color:var(--grass);padding:7px 0" id="${o.id}-cc-calves-display">—</div>
              </div>
            </div>
            <div class="cc-formula" style="margin-top:8px">Cows × Calf Crop% × (1 − Death Loss%) = Calves available to sell. This also sets the Head Count for the operation above.</div>
          </div>
        </div>

        <!-- COW & BULL DEPRECIATION -->
        <div class="cc-section">
          <div class="cc-section-hdr"><span class="cc-section-ico">🐄</span><span class="cc-section-title">Cow &amp; Bull Depreciation / Replacement</span><span class="cc-section-result" id="${o.id}-cc-depr-result-sec">—</span></div>
          <div class="cc-body">
            <div class="cc-depr-cols">
              <div class="cc-depr-col">
                <div style="font-family:'Libre Baskerville',serif;font-size:.88rem;font-weight:700;margin-bottom:3px">Cow Depreciation</div>
                <div class="cc-formula" style="margin-bottom:10px">Even when cows are "paid for," they lose value every year that must be recovered through calf sales.</div>
                <div class="cc-grid2" style="margin-bottom:6px">
                  <div class="cc-lbl">Replacement heifer/bred cow cost today<small>What it costs to replace one cow</small></div>
                  <input class="cc-in" type="number" id="${o.id}-cc-depr-cow-replace" placeholder="e.g. 2800" min="0" step="10" oninput="calcCCDepr('${o.id}')">
                </div>
                <div class="cc-grid2" style="margin-bottom:6px">
                  <div class="cc-lbl">Cull cow salvage value<small>What she sells for at market</small></div>
                  <input class="cc-in" type="number" id="${o.id}-cc-depr-cow-salvage" placeholder="e.g. 1200" min="0" step="10" oninput="calcCCDepr('${o.id}')">
                </div>
                <div class="cc-grid2" style="margin-bottom:6px">
                  <div class="cc-lbl">Years kept before culling<small>Productive years in the herd</small></div>
                  <input class="cc-in" type="number" id="${o.id}-cc-depr-cow-years" placeholder="e.g. 7" min="1" max="20" oninput="calcCCDepr('${o.id}')">
                </div>
                <div class="cc-depr-result">
                  <div><div style="font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mist)">Cow Depr / Cow / Year</div><div style="font-size:.62rem;color:var(--mist)">(Replace − Salvage) ÷ Years</div></div>

        <!-- FEED & HAY -->
        <div class="cc-section">

          <div class="cc-body">
            <div style="margin-bottom:10px">
              <div class="cc-grid5" style="margin-bottom:4px">
                <div class="cc-hdr" style="text-align:left">Feed Ingredient</div>
                <div class="cc-hdr">Lbs/Hd/Day</div><div class="cc-hdr">Days Fed/Yr</div><div class="cc-hdr">$/Ton</div><div class="cc-hdr">$/Cow/Yr</div>
              </div>
              ${[
                {id:'hay',    lbl:'Hay',                  hint:'All types — grass, alfalfa, mixed', lbsph:'e.g. 30', dph:'e.g. 120', tph:'e.g. 180'},

              </div>
              <div class="cc-grid5" style="margin-bottom:4px">
                <div class="cc-lbl">Mineral / Salt<small>Bagged or loose mineral, blocks</small></div>

                  <input class="cc-in" type="number" id="${o.id}-cc-mineral-month" placeholder="e.g. 150" min="0" step="10" oninput="calcCCFeed('${o.id}')">

                  <input class="cc-in" type="number" id="${o.id}-cc-mineral-months" placeholder="e.g. 12" min="0" max="12" oninput="calcCCFeed('${o.id}')">

            <div><div class="cc-total-lbl">Total Feed &amp; Hay / Cow / Year</div></div>
            <div style="text-align:right"><div class="cc-total-val" id="${o.id}-cc-feed-total">—</div></div>
          </div>
        </div>

        <!-- PASTURE -->

/* ═══════════════════════════════════════════
   COST RECALC
═══════════════════════════════════════════ */
function recalc(op){
  syncWizardAuto(op);
  const head      = numIn(op+'-head');
  const buywt     = numIn(op+'-buywt');
  const buyprice  = numIn(op+'-buyprice');
  const sellwt    = numIn(op+'-sellwt');
  const sellprice = numIn(op+'-sellprice');

  // For Spring Calves, purchase cost comes from the cow/calf wizard (already in the field)
  // For all others, auto-calculate from buy weight × buy price
  if(op !== 'springcalf'){
    const purchCost = (buywt / 100) * buyprice;
    const purchEl   = $(op+'-purchase');
    if(purchEl){ purchEl.value = purchCost>0 ? purchCost.toFixed(2) : ''; purchEl.placeholder = purchCost>0?'':'auto'; }
  }

  // Sum all category costs per head
  let totalHd = 0;
  const vals  = {};
  CATS.forEach(c=>{ const v=parseFloat($(op+'-'+c.key)?.value)||0; vals[c.key]=v; totalHd+=v; });

  // Per-row computed columns
  CATS.forEach(c=>{
    const tEl = $(op+'-'+c.key+'-tot');
    const pEl = $(op+'-'+c.key+'-pct');
    if(vals[c.key]>0){
      tEl.textContent = head>0 ? money(vals[c.key]*head,0) : money(vals[c.key]);
      tEl.classList.add('v');
      pEl.textContent = totalHd>0 ? (vals[c.key]/totalHd*100).toFixed(1)+'%' : '—';
      pEl.classList.add('v');
    } else {
      tEl.textContent='—'; tEl.classList.remove('v');
      pEl.textContent='—'; pEl.classList.remove('v');
    }
  });

  // Footer
  $(op+'-tot-hd').textContent   = totalHd>0 ? money(totalHd) : '—';
  $(op+'-tot-herd').textContent = totalHd>0&&head>0 ? money(totalHd*head,0) : '—';

  // Breakeven: total cost ÷ (sell wt in cwt)
  const sellCwt = sellwt/100;
  const beCwt   = sellCwt>0 && totalHd>0 ? totalHd/sellCwt : null;
  $(op+'-be-hd').textContent  = totalHd>0 ? money(totalHd) : '—';
  $(op+'-be-cwt').textContent = beCwt     ? money(beCwt)   : '—';

  // Revenue & net
  const rev = sellCwt>0 && sellprice>0 ? sellCwt*sellprice : null;
  const net = rev!==null && totalHd>0   ? rev-totalHd       : null;
  $(op+'-rev').textContent = rev ? money(rev) : '—';
  const netEl = $(op+'-net');
  if(net!==null){ netEl.textContent=money(net); netEl.style.color=net>=0?'var(--grn)':'var(--red)'; netEl.style.fontWeight='600'; }
  else           { netEl.textContent='—'; netEl.style.color=''; netEl.style.fontWeight=''; }

  // Risk gauge
  riskGauge(op, totalHd, rev);

  // Sidebar
  const disp = totalHd>0 ? money(totalHd,0)+'/hd' : '—';
  $('tabval-'+op).textContent = disp;
  $('sumv-'+op).textContent   = totalHd>0 ? money(totalHd,0) : '—';
  refreshBE();

  // Cascade to LRP
  calcLRP(op);
}

function refreshBE(){
  let best=null;
  OPS.forEach(o=>{
    let t=0; CATS.forEach(c=>{ t+=parseFloat($(o.id+'-'+c.key)?.value)||0; });
    const sw=numIn(o.id+'-sellwt');
    if(t>0&&sw>0){ const be=t/(sw/100); if(!best||be<best.val) best={val:be,id:o.id}; }
  });
  $('sumv-be').textContent = best ? money(best.val)+'/cwt' : '—';
}

function riskGauge(op, cost, rev){
  const pin = $(op+'-pin');
  const msg = $(op+'-rmsg');
  if(!cost||!rev){ pin.style.left='50%'; msg.className='risk-msg'; msg.textContent=''; return; }
  const r = cost/rev;
  let pct,cls,txt;
  if(r<0.75){
    pct=r/0.75*33; cls='g';
    txt=`✓ Healthy margin. Input costs are ${(r*100).toFixed(0)}% of expected revenue. Good buffer before breakeven — LRP can lock in that margin even if markets move.`;
  } else if(r<0.92){
    pct=33+(r-0.75)/0.17*34; cls='w';
    txt=`⚠ Moderate risk. Input costs are ${(r*100).toFixed(0)}% of expected revenue. A modest price decline could put this run below breakeven. LRP coverage is strongly recommended.`;
  } else {
    pct=Math.min(67+(r-0.92)/0.1*33,98); cls='r';
    txt=`⚠ High risk. Input costs are ${(r*100).toFixed(0)}% of expected revenue. Very little margin for a price decline. Review the LRP tab — comprehensive coverage is critical.`;
  }
  pin.style.left=pct.toFixed(1)+'%';
  msg.className=`risk-msg ${cls}`;
  msg.textContent=txt;
}

/* ═══════════════════════════════════════════
   LRP CALC
═══════════════════════════════════════════ */
function calcLRP(op){
  const lrpWt  = numIn(op+'-lrp-wt');
  const eev    = numIn(op+'-lrp-eev');
  const prem   = numIn(op+'-lrp-prem');
  const lrpHd  = numIn(op+'-lrp-head');
  const covPct = activeCov[op]/100;

  // Grab total cost from costs tab
  let cost=0; CATS.forEach(c=>{ cost+=parseFloat($(op+'-'+c.key)?.value)||0; });

  const premHd     = prem*lrpWt;         // premium cost per head
  const hasEEV     = eev>0 && lrpWt>0;
  const hasCost    = cost>0;
  const hasPrem    = prem>0;
  const hasAll     = hasEEV && hasCost && hasPrem;

  /* ── Coverage level cards ── */
  COV_PCTS.forEach(pct=>{
    const fEl = $(op+'-cf-'+pct);
    const lEl = $(op+'-cl-'+pct);
    const nEl = $(op+'-cn-'+pct);
    const card= document.querySelector(`#op-${op} .cov-card[data-pct="${pct}"]`);

    if(hasEEV){
      const floor       = eev*(pct/100);
      // Max price loss per head = how much the producer loses per head
      // if the market drops all the way to the floor (before LRP pays)
      // = (EEV - floor) × insured cwt
      const maxLossHd   = (eev-floor)*lrpWt;
      const revAtFloor  = floor*lrpWt;
      // Net per head if market hits exactly the floor:
      // revenue at floor + LRP indemnity (= 0 at floor) - cost - premium
      // Note: at exactly the floor the indemnity = 0 by definition,
      // so net = revAtFloor - cost - premHd
      const netAtFloor  = hasCost && hasPrem ? revAtFloor - cost - premHd : null;
      const isOK        = netAtFloor !== null && netAtFloor >= 0;

      fEl.textContent = `Floor: $${floor.toFixed(2)}/cwt`;
      lEl.textContent = `Max price loss: ${money(maxLossHd)}/hd`;

      // Color logic
      card.classList.remove('ok','bad');
      if(hasAll){
        card.classList.add(isOK?'ok':'bad');
        lEl.className  = 'cov-loss'; // inherits color from card via CSS
        nEl.textContent= (netAtFloor>=0?'+':'')+money(netAtFloor)+' net at floor';
        nEl.className  = 'cov-net';
      } else {
        lEl.className  = 'cov-loss';
        nEl.textContent= hasCost ? 'Enter premium for net' : '';
        nEl.className  = 'cov-net';
      }
    } else {
      fEl.textContent='Floor: —';
      lEl.textContent='Max price loss: —'; lEl.className='cov-loss';
      nEl.textContent=''; nEl.className='cov-net';
      card.classList.remove('ok','bad');
    }
  });

  if(!hasEEV){ clearCmp(op); return; }

  /* ── Core LRP math ── */
  const floor   = eev*covPct;

  // Uninsured net per head at a given market price
  const unNet = p => (p*lrpWt) - cost;

  // Insured net per head at a given market price:
  // revenue at market + LRP indemnity - cost - premium
  // LRP indemnity = max(0, floor - market) × lrpWt
  const indem = p => Math.max(0, floor-p)*lrpWt;
  const inNet = p => (p*lrpWt) + indem(p) - cost - premHd;

  const d10 = eev*0.90;
  const d20 = eev*0.80;

  /* ── Uninsured column ── */
  $(op+'-u-cost').textContent    = hasCost ? money(cost)           : '—';
  $(op+'-u-rev').textContent     = money(eev*lrpWt);
  setRV(op+'-u-net0', hasCost ? unNet(eev)  : null);
  setRV(op+'-u-d10',  hasCost ? unNet(d10)  : null);
  setRV(op+'-u-d20',  hasCost ? unNet(d20)  : null);

  const maxHerdLoss = hasCost && lrpHd>0 ? unNet(d20)*lrpHd : null;
  $(op+'-u-maxloss').textContent = maxHerdLoss!==null ? money(maxHerdLoss,0)+' total' : '—';
  if(maxHerdLoss!==null) colorRV(op+'-u-maxloss', maxHerdLoss);

  setRV(op+'-u-foot', hasCost ? unNet(eev) : null);

  /* ── Insured column ── */
  if(hasPrem){
    $(op+'-i-cost').textContent  = hasCost ? money(cost+premHd)          : '—';
    $(op+'-i-floor').textContent = `$${floor.toFixed(2)}/cwt (${activeCov[op]}% of EEV)`;
    setRV(op+'-i-net0', hasCost ? inNet(eev) : null);
    setRV(op+'-i-d10',  hasCost ? inNet(d10) : null);
    setRV(op+'-i-d20',  hasCost ? inNet(d20) : null);

    const saved = hasCost && lrpHd>0 ? (inNet(d20)-unNet(d20))*lrpHd : null;
    $(op+'-i-saved').textContent = saved!==null ? money(saved,0)+' saved' : '—';
    setRV(op+'-i-foot', hasCost ? inNet(eev) : null);
  }

  /* ── Scenario bars ── */
  buildScen(op, eev, lrpWt, cost, premHd, unNet, inNet, hasCost);
}

function setRV(id, val){
  const el = $(id); if(!el) return;
  el.textContent = val!==null ? money(val) : '—';
  colorRV(id, val);
}

function colorRV(id, val){
  const el=$(id); if(!el) return;
  el.classList.remove('pos','neg');
  if(val===null) return;
  if(val>0)  el.classList.add('pos');
  if(val<0)  el.classList.add('neg');
}

function clearCmp(op){
  ['u-cost','u-rev','u-net0','u-d10','u-d20','u-maxloss','u-foot',
   'i-cost','i-floor','i-net0','i-d10','i-d20','i-saved','i-foot']
  .forEach(s=>{ const el=$(op+'-'+s); if(el){ el.textContent='—'; el.classList.remove('pos','neg'); } });
  const sc=$(op+'-scen');
  if(sc) sc.innerHTML='<div style="font-size:.76rem;color:var(--stone);padding:8px 0">Enter input costs and LRP details above to see the scenario comparison.</div>';
}

function buildScen(op, eev, wt, cost, premHd, unFn, inFn, hasCost){
  const el=$(op+'-scen'); if(!el) return;
  if(!hasCost){ el.innerHTML='<div style="font-size:.76rem;color:var(--stone);padding:8px 0">Enter input costs above to see scenarios.</div>'; return; }

  const scenarios=[
    {lbl:'Market +10%', p:eev*1.10},
    {lbl:'Market flat', p:eev},
    {lbl:'Market −5%',  p:eev*0.95},
    {lbl:'Market −10%', p:eev*0.90},
    {lbl:'Market −15%', p:eev*0.85},
    {lbl:'Market −20%', p:eev*0.80},
  ];

  const maxAbs=Math.max(...scenarios.map(s=>Math.max(Math.abs(unFn(s.p)),Math.abs(inFn(s.p)))),1);

  el.innerHTML=scenarios.map(s=>{
    const un=unFn(s.p), ins=inFn(s.p);
    const wu=(Math.abs(un)/maxAbs*100).toFixed(1);
    const wi=(Math.abs(ins)/maxAbs*100).toFixed(1);
    const cu=un >=0?'rgba(36,110,24,.4)':'rgba(168,32,32,.45)';
    const ci=ins>=0?'var(--grass)':'#c06820';
    const tu=un >=0?'var(--grn)':'var(--red)';
    const ti=ins>=0?'var(--grn)':'var(--warn)';
    return `
    <div class="scen-row">
      <span class="scen-name">${s.lbl}</span>
      <div class="scen-track">
        <div class="s-un" style="width:${wu}%;background:${cu}"></div>
        <div class="s-in" style="width:${wi}%;background:${ci}"></div>
      </div>
      <div class="scen-vals">
        <span style="color:${tu};font-size:.64rem">${money(un)}</span>
        <span style="color:${ti}">${money(ins)}</span>
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   COST BUILDER WIZARD
═══════════════════════════════════════════ */

function toggleWizard(op){
  const body  = $(op+'-wzbody');
  const arrow = $(op+'-wzarrow');
  const open  = body.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

/* sync read-only fields from meta inputs */
function syncWizardAuto(op){
  const buywt    = numIn(op+'-buywt');
  const buyprice = numIn(op+'-buyprice');
  const days     = numIn(op+'-days');
  const purchCost = op==='springcalf' ? numIn(op+'-purchase') : (buywt/100)*buyprice;

  const intPurch  = $(op+'-int-purchase');
  const intDays   = $(op+'-int-days');
  const dlPurch   = $(op+'-dl-purchase');
  const intOpcost = $(op+'-int-opcost');

  if(intPurch) intPurch.value = purchCost>0 ? purchCost.toFixed(2) : '';
  if(intDays)  intDays.value  = days>0      ? days                 : '';
  if(dlPurch)  dlPurch.value  = purchCost>0 ? purchCost.toFixed(2) : '';

  // Auto-fill operating costs = sum of all cost table rows except purchase and interest
  if(intOpcost){
    const excludeKeys = ['purchase','interest'];
    let opCostSum = 0;
    CATS.forEach(c=>{
      if(!excludeKeys.includes(c.key)){
        opCostSum += parseFloat($(op+'-'+c.key)?.value)||0;
      }
    });
    intOpcost.value = opCostSum>0 ? opCostSum.toFixed(2) : '';
  }

  calcInterest(op);
  calcDeathLoss(op);
}

/* ── Feed ── */
function calcFeed(op){
  const days = numIn(op+'-days');
  const feeds = ['hay','sil','grn','sup','c1'];
  let totalCpd = 0;
  feeds.forEach(f=>{
    const lbs = numIn(op+`-fi-${f}-lbs`);
    const ton = numIn(op+`-fi-${f}-ton`);
    const cpd = lbs>0 && ton>0 ? (lbs/2000)*ton : 0; // lbs ÷ 2000 × $/ton = $/day
    totalCpd += cpd;
    const el = $(op+`-fi-${f}-cpd`);
    if(el) el.textContent = cpd>0 ? ('$'+cpd.toFixed(3)) : '—';
  });
  $(op+'-feed-cpd-tot').textContent = totalCpd>0 ? ('$'+totalCpd.toFixed(3)+'/hd/day') : '—';
  const totalHd = days>0 && totalCpd>0 ? totalCpd*days : null;
  $(op+'-feed-total-hd').textContent = totalHd!==null ? money(totalHd)+'/hd total' : '—';
}

/* ── Pasture ── */
function calcPasture(op){
  const total  = numIn(op+'-past-total');
  const head   = numIn(op+'-past-head');
  const perHd  = numIn(op+'-past-perhd');
  let result   = null;
  if(perHd>0){
    result = perHd;
  } else if(total>0 && head>0){
    result = total/head;
  }
  $(op+'-past-result').textContent = result!==null ? money(result)+'/head' : '—';
}

/* ── Interest ── */
function calcInterest(op){
  const purchase = numIn(op+'-int-purchase');
  const opCost   = numIn(op+'-int-opcost');
  const rate     = numIn(op+'-int-rate');
  const days     = numIn(op+'-int-days');
  if(purchase>0 && rate>0 && days>0){
    const principal = purchase + opCost;
    const interest  = principal * (rate/100) * (days/365);
    $(op+'-int-result').textContent = money(interest)+'/head';
  } else {
    $(op+'-int-result').textContent = '—';
  }
}

/* ── Death Loss ── */
function calcDeathLoss(op){
  const purchase = numIn(op+'-dl-purchase');
  const rate     = numIn(op+'-dl-rate');
  if(purchase>0 && rate>0){
    const dl = purchase*(rate/100);
    $(op+'-dl-result').textContent = money(dl)+'/head';
  } else {
    $(op+'-dl-result').textContent = '—';
  }
}

/* ── Apply all wizard values to cost table ── */
function applyWizard(op){
  // Feed
  const days = numIn(op+'-days');
  const feeds = ['hay','sil','grn','sup','c1'];
  let totalCpd = 0;
  feeds.forEach(f=>{
    const lbs = numIn(op+`-fi-${f}-lbs`);
    const ton = numIn(op+`-fi-${f}-ton`);
    totalCpd += (lbs>0 && ton>0) ? (lbs/2000)*ton : 0;
  });
  const feedTotal = days>0 && totalCpd>0 ? totalCpd*days : 0;
  if(feedTotal>0){ const el=$(op+'-feed'); if(el) el.value=feedTotal.toFixed(2); }

  // Pasture
  const pastTotal = numIn(op+'-past-total');
  const pastHead  = numIn(op+'-past-head');
  const pastPerHd = numIn(op+'-past-perhd');
  let pastResult  = 0;
  if(pastPerHd>0) pastResult = pastPerHd;
  else if(pastTotal>0 && pastHead>0) pastResult = pastTotal/pastHead;
  if(pastResult>0){ const el=$(op+'-pasture'); if(el) el.value=pastResult.toFixed(2); }

  // Interest
  const purchase = numIn(op+'-int-purchase');
  const opCost   = numIn(op+'-int-opcost');
  const rate     = numIn(op+'-int-rate');
  const intDays  = numIn(op+'-int-days');
  if(purchase>0 && rate>0 && intDays>0){
    const interest = (purchase+opCost)*(rate/100)*(intDays/365);
    const el=$(op+'-interest'); if(el) el.value=interest.toFixed(2);
  }

  // Death Loss
  const dlPurch = numIn(op+'-dl-purchase');
  const dlRate  = numIn(op+'-dl-rate');
  if(dlPurch>0 && dlRate>0){
    const dl = dlPurch*(dlRate/100);
    const el=$(op+'-death'); if(el) el.value=dl.toFixed(2);
  }

  // Trigger recalc
  recalc(op);

  // Show confirmation
  const conf = $(op+'-wiz-applied');
  if(conf){ conf.style.display='inline'; setTimeout(()=>conf.style.display='none', 2500); }
}

function toggleCCWizard(op){

function ccWizardFill(id, val){
  const el = $(id); if(!el) return;

    if(el.value==='' || el.hasAttribute('data-ccwiz')){
      el.value = val.toFixed(2);
      el.setAttribute('data-ccwiz','1');

function recalcCC(op){
  const p = op+'-cc-';
  const cows     = numIn(p+'cows');
  const calvePct = numIn(p+'calvepct');
  const dlPct    = numIn(p+'deathloss');
  const calves   = cows>0 && calvePct>0 ? cows*(calvePct/100)*(1-dlPct/100) : 0;

  // Run all section calcs — returns $/cow/year values directly
  const cowDeprVal  = calcCCDepr(op, true);
  const bullDeprVal = calcCCDeprBull(op);
  const feedVal     = calcCCFeed(op, true);
  const pastVal     = calcCCPasture(op, true);
  const vetVal      = calcCCVet(op, true);
  const intVal      = calcCCInterest(op, true);
  const eqVal       = calcCCEquipment(op, true);
  const labVal      = calcCCLabor(op, true);

  // Misc rows
  let miscTotal = 0;
  [1,2,3].forEach(n=>{
    const v = numIn(p+'misc'+n+'-cost');
    const totEl = $(p+'misc'+n+'-tot');
    if(totEl) totEl.textContent = v>0 ? money(v) : '—';
    miscTotal += v;
  });
  const miscSecEl = $(p+'misc-result-sec');
  if(miscSecEl) miscSecEl.textContent = miscTotal>0 ? money(miscTotal)+'/cow' : '—';
  const miscTotEl = $(p+'misc-total');
  if(miscTotEl) miscTotEl.textContent = miscTotal>0 ? money(miscTotal) : '—';

  const totalPerCow = cowDeprVal + bullDeprVal + feedVal + pastVal + vetVal + intVal + eqVal + labVal + miscTotal;
  const costPerCalf = calves>0 && totalPerCow>0 ? (totalPerCow*cows)/calves : null;

  const calvDisp = $(p+'calves-display');
  if(calvDisp) calvDisp.textContent = calves>0 ? Math.round(calves)+' head' : '—';

  const cpcEl = $(p+'costpercow');      if(cpcEl)  cpcEl.textContent  = totalPerCow>0 ? money(totalPerCow) : '—';
  const calfEl= $(p+'costpercalf');     if(calfEl) calfEl.textContent = costPerCalf ? money(costPerCalf) : '—';
  const hdEl  = $(p+'headcount');       if(hdEl)   hdEl.textContent   = calves>0 ? Math.round(calves)+' head' : '—';
  const bigEl = $(p+'costpercalf-big'); if(bigEl)  bigEl.textContent  = costPerCalf ? money(costPerCalf) : '—';

  if(costPerCalf){
    ccWizardFill(op+'-purchase', costPerCalf);
    const noteEl = $(p+'autofill-note');
    if(noteEl) noteEl.textContent = `\u2756 Auto-filled: ${money(costPerCalf)}/calf \u2192 Cost of Calf at Birth row. ${calves>0?Math.round(calves)+' calves':'\u2014'} head count set.`;
    const headEl = $(op+'-head');
    if(headEl && (headEl.value==='' || headEl.hasAttribute('data-ccwiz'))){
      headEl.value = Math.round(calves);
      headEl.setAttribute('data-ccwiz','1');
    }
  }
  recalc(op);
}

// Returns cow depreciation $/cow/year
function calcCCDepr(op, skipRecalc){
  const p = op+'-cc-';
  const cowReplace = numIn(p+'depr-cow-replace');
  const cowSalvage = numIn(p+'depr-cow-salvage');
  const cowYears   = numIn(p+'depr-cow-years');
  const cowDepr    = cowReplace>0 && cowYears>0 ? Math.max(0,(cowReplace-cowSalvage)/cowYears) : null;

  const bullPrice  = numIn(p+'depr-bull-price');
  const bullYears  = numIn(p+'depr-bull-years');
  const bullCows   = numIn(p+'depr-bull-cows');
  const bullDepr   = bullPrice>0 && bullYears>0 && bullCows>0 ? (bullPrice/bullYears)/bullCows : null;

  const cowResEl = $(p+'depr-cow-result'); if(cowResEl) cowResEl.textContent = cowDepr!==null ? money(cowDepr) : '\u2014';
  const bulResEl = $(p+'depr-bull-result'); if(bulResEl) bulResEl.textContent = bullDepr!==null ? money(bullDepr) : '\u2014';
  const total = (cowDepr||0)+(bullDepr||0);
  const secEl = $(p+'depr-result-sec'); if(secEl) secEl.textContent = total>0 ? money(total)+'/cow' : '\u2014';

  // Mirror to cost table rows (display only — recalcCC uses returned values)
  const cowInput = $(op+'-cowdepr');
  const bulInput = $(op+'-bulldepr');
  if(cowInput && cowDepr!==null){ cowInput.value=cowDepr.toFixed(2); cowInput.style.background='var(--gold-p)'; cowInput.style.color='var(--hide)'; }
  else if(cowInput && cowReplace===0){ cowInput.value=''; cowInput.style.background=''; cowInput.style.color=''; }
  if(bulInput && bullDepr!==null){ bulInput.value=bullDepr.toFixed(2); bulInput.style.background='var(--gold-p)'; bulInput.style.color='var(--hide)'; }
  else if(bulInput && bullPrice===0){ bulInput.value=''; bulInput.style.background=''; bulInput.style.color=''; }

  if(!skipRecalc) recalcCC(op);
  return cowDepr||0;
}

// Returns bull depreciation $/cow/year (used separately in recalcCC sum)
function calcCCDeprBull(op){
  const p = op+'-cc-';

  const bullYears = numIn(p+'depr-bull-years');
  const bullCows  = numIn(p+'depr-bull-cows');

}

function calcCCFeed(op, skipRecalc){
  const p    = op+'-cc-';
  const cows = numIn(p+'cows');
  function lbsDaysTon(a,b,c,r){ const lbs=numIn(p+a),days=numIn(p+b),ton=numIn(p+c); const v=(lbs>0&&days>0&&ton>0)?(lbs*days/2000)*ton:null; const el=$(p+r); if(el) el.textContent=v!==null?money(v):'\u2014'; return v||0; }
  function monthDiv(a,b,r){ const mo=numIn(p+a),mos=numIn(p+b); const v=(mo>0&&mos>0&&cows>0)?(mo*mos)/cows:null; const el=$(p+r); if(el) el.textContent=v!==null?money(v)+'/cow':(cows===0?'Enter # cows':'\u2014'); return v||0; }
  const hay=lbsDaysTon('hay-lbs','hay-days','hay-ton','hay-cow');
  const silage=lbsDaysTon('silage-lbs','silage-days','silage-ton','silage-cow');
  const cubes=lbsDaysTon('cubes-lbs','cubes-days','cubes-ton','cubes-cow');
  const tubs=monthDiv('tubs-month','tubs-months','tubs-cow');
  const mineral=monthDiv('mineral-month','mineral-months','mineral-cow');
  let miscFeed=0; [1,2,3].forEach(n=>{ const v=numIn(p+'feedmisc'+n+'-cost'); const el=$(p+'feedmisc'+n+'-tot'); if(el) el.textContent=v>0?money(v):'\u2014'; miscFeed+=v; });
  const total=hay+silage+cubes+tubs+mineral+miscFeed;
  const totEl=$(p+'feed-total'); if(totEl) totEl.textContent=total>0?money(total):'\u2014';
  const secEl=$(p+'feed-result-sec'); if(secEl) secEl.textContent=total>0?money(total)+'/cow':'\u2014';
  if(!skipRecalc) recalcCC(op);
  return total;
}
